<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Инструкция ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(180deg,#ff4d4d,#b30000);
    color:white;
    min-height:100vh;
    padding:25px;
}

h1{
    text-align:center;
    font-size:34px;
}

.subtitle{
    text-align:center;
    opacity:.8;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(8px);
    border-radius:18px;
    margin:12px 0;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.header{
    padding:18px;
    cursor:pointer;
    font-size:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.locked{
    opacity:.45;
}

.content{
    display:none;
    padding:20px;
    background:rgba(255,255,255,.08);
    line-height:1.6;
}

button{
    width:100%;
    margin-top:20px;
    border:none;
    border-radius:12px;
    padding:14px;
    background:white;
    color:#d1002b;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

.hearts{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
color:rgba(255,255,255,.18);
animation:fly 8s linear infinite;
font-size:24px;
}

@keyframes fly{
0%{
transform:translateY(100vh) scale(.5);
}
100%{
transform:translateY(-120px) scale(1.5);
}
}
</style>

</head>
<body>

<div class="hearts"></div>

<h1>❤️ ИНСТРУКЦИЯ ❤️</h1>

<p class="subtitle">Сначала прочти инструкцию)</p>

<div id="cards"></div>

<script>

const steps=[
{
title:"Записка",
text:"там 3 части, открой и прочитай их до конца! И только потом следуй дальше инструкции."
},
{
title:"Конверт №2",
text:"тут у нас 101 причина за что я тебя люблю) Теперь можешь открыть белую коробку с сердечками. Там они связаны, да коряво, но я ненавижу эти верёвочки ;< и дальше некоторые из записок хранят даты. ищи на каждой фонариком. Подсказка: они на задней стороне записки."
},
{
title:"Конверт №3",
text:"а теперь конверт под номерком 3 посмотри что там..."
},
{
title:"Конверт №4",
text:"вопрос: как бы мы выглядели, будь мы котами?"
},
{
title:"Игрушка",
text:"раскрой внутрь игрушки) там маленький сюрприз внутри."
},
{
title:"края коробочки",
text:"теперь самое время посмотреть коробку полностью. может там запрятаны сладости :)"
},
{
title:"последний сюрприз",
text:"Когда закончишь со всем, переверни коробку и загляни на самое дно ❤️"
}
];

let unlocked=Number(localStorage.getItem("gift"))||0;

const container=document.getElementById("cards");

function render(){

container.innerHTML="";

steps.forEach((step,i)=>{

const card=document.createElement("div");
card.className="card";

const head=document.createElement("div");
head.className="header";

if(i>unlocked){
head.classList.add("locked");
head.innerHTML=`🔒 ${step.title}`;
}
else{
head.innerHTML=`🔓 ${step.title}`;
head.onclick=()=>{

content.style.display=
content.style.display=="block"?"none":"block";

};

}

const content=document.createElement("div");
content.className="content";

content.innerHTML=`${step.text}`;

if(i==unlocked){

const btn=document.createElement("button");

btn.innerText=i==steps.length-1?
"❤️ Завершить":
"✅ Прочитано";

btn.onclick=()=>{

if(unlocked<steps.length-1){

unlocked++;
localStorage.setItem("gift",unlocked);
render();

}else{

alert("спасибо что прошла этот маленький путь. надеюсь тебе понравилось, люблю :3 ❤️");

}

};

content.appendChild(btn);

}

card.appendChild(head);
card.appendChild(content);
container.appendChild(card);

});

}

render();

const hearts=document.querySelector(".hearts");

for(let i=0;i<25;i++){

const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"%";
h.style.animationDelay=Math.random()*8+"s";
h.style.fontSize=(18+Math.random()*18)+"px";
hearts.appendChild(h);

}

</script>

</body>
</html>
